{% extends "base.html" %}
{% block title %}{{ 'Edit' if expense else 'Add' }} Expense - Vypar{% endblock %}
{% block page_title %}{{ 'Edit' if expense else 'Record' }} Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Date <span class="text-danger">*</span></label>
                            <input type="date" name="expense_date" class="form-control"
                                   value="{{ expense.expense_date.isoformat() if expense else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select name="category_id" class="form-select">
                                <option value="">-- None --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if expense and expense.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Amount <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" name="amount" class="form-control"
                                   value="{{ expense.amount|float if expense else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Payment Mode</label>
                            <select name="payment_mode" class="form-select">
                                {% for m in ['cash', 'bank', 'upi', 'cheque'] %}
                                <option value="{{ m }}" {% if expense and expense.payment_mode == m %}selected{% endif %}>{{ m|title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check mt-4">
                                <input type="checkbox" name="gst_applicable" class="form-check-input"
                                       {% if expense and expense.gst_applicable %}checked{% endif %}>
                                <label class="form-check-label">GST Applicable</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">GST Rate (%)</label>
                            <input type="number" step="0.01" name="gst_rate" class="form-control"
                                   value="{{ expense.gst_rate|float if expense else 0 }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea name="notes" class="form-control" rows="2">{{ expense.notes if expense else '' }}</textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">{{ 'Update' if expense else 'Save' }} Expense</button>
                        <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
