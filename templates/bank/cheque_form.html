{% extends "base.html" %}
{% block title %}Add Cheque - Vypar{% endblock %}
{% block page_title %}Add Cheque{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card"><div class="card-body">
<form method="POST">
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Cheque Type *</label><select name="cheque_type" class="form-select"><option value="received">Received</option><option value="issued">Issued</option></select></div>
        <div class="col-md-6"><label class="form-label">Cheque Number *</label><input type="text" name="cheque_number" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Amount *</label><input type="number" step="0.01" name="amount" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Issue Date *</label><input type="date" name="issue_date" class="form-control" value="{{ today }}" required></div>
        <div class="col-md-6"><label class="form-label">Party</label><select name="party_id" class="form-select"><option value="">-- Select --</option>{% for p in parties %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div>
        <div class="col-md-6"><label class="form-label">Bank Name</label><input type="text" name="bank_name" class="form-control"></div>
        <div class="col-12"><label class="form-label">Remark</label><input type="text" name="remark" class="form-control"></div>
    </div>
    <div class="mt-4"><button type="submit" class="btn btn-primary">Save</button><a href="{{ url_for('bank.list_cheques') }}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
