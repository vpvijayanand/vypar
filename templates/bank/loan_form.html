{% extends "base.html" %}
{% block title %}Add Loan Account - Vypar{% endblock %}
{% block page_title %}Add Loan Account{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card"><div class="card-body">
<form method="POST">
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Lender Name *</label><input type="text" name="lender_name" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Loan Type</label><select name="loan_type" class="form-select"><option value="term">Term Loan</option><option value="overdraft">Overdraft</option><option value="working_capital">Working Capital</option></select></div>
        <div class="col-md-6"><label class="form-label">Loan Amount *</label><input type="number" step="0.01" name="loan_amount" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Interest Rate (%)</label><input type="number" step="0.01" name="interest_rate" class="form-control"></div>
        <div class="col-md-6"><label class="form-label">EMI Amount</label><input type="number" step="0.01" name="emi_amount" class="form-control"></div>
        <div class="col-md-6"><label class="form-label">Tenure (Months)</label><input type="number" name="tenure_months" class="form-control" value="12"></div>
        <div class="col-md-6"><label class="form-label">Start Date</label><input type="date" name="start_date" class="form-control" value="{{ today }}"></div>
    </div>
    <div class="mt-4"><button type="submit" class="btn btn-primary">Save</button><a href="{{ url_for('bank.list_accounts') }}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
