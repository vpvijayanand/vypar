{% extends "base.html" %}
{% block title %}{{ 'Edit' if item else 'Add' }} Item - Vypar{% endblock %}
{% block page_title %}{{ 'Edit' if item else 'Add New' }} Item{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Item Name <span class="text-danger">*</span></label>
                            <input type="text" name="item_name" class="form-control" value="{{ item.item_name if item else '' }}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">SKU / Item Code</label>
                            <input type="text" name="item_code" class="form-control" value="{{ item.item_code if item else '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">HSN Code</label>
                            <input type="text" name="hsn_code" class="form-control" value="{{ item.hsn_code if item else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Category</label>
                            <select name="category_id" class="form-select">
                                <option value="">-- None --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if item and item.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Unit</label>
                            <select name="unit" class="form-select">
                                {% for u in ['pcs', 'kg', 'g', 'ltr', 'ml', 'mtr', 'cm', 'ft', 'box', 'pair', 'dozen', 'set'] %}
                                <option value="{{ u }}" {% if item and item.unit == u %}selected{% endif %}>{{ u|upper }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Barcode</label>
                            <input type="text" name="barcode" class="form-control" value="{{ item.barcode if item else '' }}">
                        </div>

                        <div class="col-12"><hr><h6 class="text-muted">Pricing</h6></div>
                        <div class="col-md-3">
                            <label class="form-label">Sale Price</label>
                            <input type="number" step="0.01" name="sale_price" class="form-control" value="{{ item.sale_price|float if item else 0 }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Purchase Price</label>
                            <input type="number" step="0.01" name="purchase_price" class="form-control" value="{{ item.purchase_price|float if item else 0 }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">GST Rate (%)</label>
                            <select name="gst_rate" class="form-select">
                                {% for rate in [0, 0.25, 3, 5, 12, 18, 28] %}
                                <option value="{{ rate }}" {% if item and item.gst_rate|float == rate %}selected{% endif %}>{{ rate }}%</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Cess (%)</label>
                            <input type="number" step="0.01" name="cess" class="form-control" value="{{ item.cess|float if item else 0 }}">
                        </div>

                        <div class="col-12"><hr><h6 class="text-muted">Stock</h6></div>
                        {% if not item %}
                        <div class="col-md-4">
                            <label class="form-label">Opening Stock Qty</label>
                            <input type="number" step="0.001" name="opening_stock_qty" class="form-control" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Opening Stock Value</label>
                            <input type="number" step="0.01" name="opening_stock_value" class="form-control" value="0">
                        </div>
                        {% endif %}
                        <div class="col-md-4">
                            <label class="form-label">Min Stock Alert</label>
                            <input type="number" step="0.001" name="min_stock_alert" class="form-control" value="{{ item.min_stock_alert|float if item else 0 }}">
                        </div>

                        <div class="col-md-6">
                            <div class="form-check">
                                <input type="checkbox" name="batch_tracking" class="form-check-input" {% if item and item.batch_tracking %}checked{% endif %}>
                                <label class="form-check-label">Enable Batch Tracking</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input type="checkbox" name="serial_tracking" class="form-check-input" {% if item and item.serial_tracking %}checked{% endif %}>
                                <label class="form-check-label">Enable Serial Number Tracking</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2">{{ item.description if item else '' }}</textarea>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ 'Update' if item else 'Save' }} Item</button>
                        <a href="{{ url_for('items.list_items') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
