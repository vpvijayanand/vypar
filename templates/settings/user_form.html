{% extends "base.html" %}
{% block title %}{{ 'Edit' if user else 'Add' }} User - Vypar{% endblock %}
{% block page_title %}{{ 'Edit' if user else 'Add' }} User{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6"><div class="card"><div class="card-body">
<form method="POST">
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Username *</label><input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" {% if user %}readonly{% endif %} required></div>
        <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" name="full_name" class="form-control" value="{{ user.full_name if user else '' }}"></div>
        <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}"></div>
        <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ user.phone if user else '' }}"></div>
        <div class="col-md-6"><label class="form-label">Role *</label><select name="role" class="form-select">
            {% for r in ['admin','staff','viewer'] %}<option value="{{ r }}" {% if user and user.role == r %}selected{% endif %}>{{ r|title }}</option>{% endfor %}
        </select></div>
        {% if not user %}
        <div class="col-md-6"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" required></div>
        {% endif %}
        {% if user %}
        <div class="col-md-6"><label class="form-label">New Password <small class="text-muted">(leave blank to keep)</small></label><input type="password" name="password" class="form-control"></div>
        {% endif %}
    </div>
    <div class="mt-4"><button type="submit" class="btn btn-primary">{{ 'Update' if user else 'Create User' }}</button><a href="{{ url_for('settings.index') }}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</form>
</div></div></div></div>
{% endblock %}
